<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | GMJ Store</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #000000;
            --accent: #0a3ca7;
            --gray-100: #f4f4f5;
            --radius-lg: 16px;
        }

        body.lock-screen {
            background-color: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .lock-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        .lock-card {
            background: white;
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .lock-logo {
            width: 120px;
            margin-bottom: 2rem;
        }

        .lock-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .lock-subtitle {
            color: #71717a;
            font-size: 0.875rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .lock-form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .lock-form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #3f3f46;
            margin-bottom: 0.5rem;
        }

        .lock-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e4e4e7;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
            box-sizing: border-box;
        }

        .lock-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(10, 60, 167, 0.1);
        }

        .lock-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .lock-btn:hover {
            background: #18181b;
            transform: translateY(-1px);
        }

        .lock-btn:active {
            transform: translateY(0);
        }

        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .whatsapp-link:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>

     <!-- SEO -->
    <meta name="robots" content="noindex, nofollow, noarchive">
    <link rel="canonical" href="https://store.gmjloreto.com.br/pages/password.html">
</head>
<body class="lock-screen">

    <div class="lock-container">
        <div class="lock-card">
            <img src="../assets/images/gmjstore_black.svg" alt="GMJ Store" class="lock-logo">
            <h1 class="lock-title">Loja em Manutenção</h1>
            <p class="lock-subtitle">Esta loja está em modo privado. Insira a senha de acesso para continuar.</p>
            
            <div id="error-message" class="error-msg">Senha incorreta. Tente novamente.</div>

            <form id="lock-form">
                <div class="lock-form-group">
                    <label>Senha de Acesso</label>
                    <input type="password" id="access-password" class="lock-input" placeholder="••••••••" required autofocus>
                </div>
                <button type="submit" id="submit-btn" class="lock-btn">Acessar Loja</button>
            </form>

            <a href="https://api.whatsapp.com/send?phone=5511952799311&text=Ol%C3%A1%2C%20gostaria%20de%20solicitar%20acesso%20%C3%A0%20GMJ%20Store." class="whatsapp-link" target="_blank">
                <span>Solicitar acesso via WhatsApp</span>
            </a>
        </div>
    </div>

    <script src="../config/config.js"></script>
    <script type="module">
        import { _supabase } from '../js/services/supabase.js';

        const form = document.getElementById('lock-form');
        const passwordInput = document.getElementById('access-password');
        const errorMsg = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const password = passwordInput.value;
            
            submitBtn.innerText = 'Verificando...';
            submitBtn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                // 1. Buscar o e-mail administrativo configurado
                const { data: settings, error: sErr } = await _supabase
                    .from('site_settings')
                    .select('admin_email_auth')
                    .single();

                if (sErr || !settings.admin_email_auth) {
                    throw new Error("Erro ao carregar configurações.");
                }

                // 2. Tentar autenticação
                const { error: authErr } = await _supabase.auth.signInWithPassword({
                    email: settings.admin_email_auth,
                    password: password
                });

                if (authErr) {
                    throw new Error("Senha inválida.");
                }

                // 3. Sucesso! Salva na sessão e desloga para não manter privilégios de admin
                sessionStorage.setItem('store_access', 'true');
                await _supabase.auth.signOut();

                // 4. Redireciona para a home
                window.location.href = '../index.html';

            } catch (err) {
                console.error(err);
                errorMsg.innerText = err.message || "Erro ao validar acesso.";
                errorMsg.style.display = 'block';
                submitBtn.innerText = 'Acessar Loja';
                submitBtn.disabled = false;
                passwordInput.value = '';
                passwordInput.focus();
            }
        };
    </script>
</body>
</html>
